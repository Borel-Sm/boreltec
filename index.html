<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BOREL TEC - Gestão & Ponto</title>
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; 
            --blue: #3b82f6; --red: #ef4444; --orange: #f59e0b; --green: #10b981; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        /* Nav Sticky */
        .nav { position: sticky; top: 0; background: var(--card-bg); padding: 15px; z-index: 100; border-bottom: 2px solid var(--blue); }
        .cards { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; min-width: 150px; border: 1px solid rgba(255,255,255,0.1); }
        .card h4 { margin: 0; font-size: 0.7rem; color: #94a3b8; }
        .valor-beneficio { font-size: 1.1rem; font-weight: bold; display: block; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        /* Calendário Customizado */
        .calendario-container { background: var(--card-bg); padding: 20px; border-radius: 12px; }
        .calendario-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grid-calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .dia-semana { font-size: 0.7rem; color: var(--blue); font-weight: bold; padding-bottom: 10px; }
        .dia { 
            padding: 10px 5px; border-radius: 6px; background: rgba(255,255,255,0.03); 
            cursor: pointer; font-size: 0.9rem; transition: 0.2s; border: 1px solid transparent;
        }
        .dia:hover { background: var(--blue); }
        .dia.com-ponto { border-color: var(--green); color: var(--green); font-weight: bold; }
        .dia.hoje { background: var(--blue); color: white; }
        .dia.outro-mes { opacity: 0.3; }

        /* Lateral Direita */
        .painel-controle { display: flex; flex-direction: column; gap: 20px; }
        .box { background: var(--card-bg); padding: 20px; border-radius: 12px; }
        #relogio { font-size: 2.5rem; font-weight: 800; color: var(--blue); text-align: center; }
        
        .btns { display: grid; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-iniciar { background: var(--blue); }
        .btn-parar { background: var(--red); }
        .btn-saida { background: var(--orange); }

        .historico-dia { margin-top: 15px; font-size: 0.85rem; border-top: 1px solid #334155; padding-top: 10px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <strong>BOREL TEC - Visão de Benefícios</strong>
        <div class="cards">
            <div class="card"><h4>Alimentação</h4><span id="val-alim" class="valor-beneficio">R$ 270,00</span></div>
            <div class="card"><h4>Produtividade</h4><span id="val-prod" class="valor-beneficio">R$ 150,00</span></div>
            <div class="card"><h4>Horas Faltosas</h4><span id="val-faltas" class="valor-beneficio">0h 0m</span></div>
        </div>
    </nav>

    <div class="container">
        <div class="calendario-container">
            <div class="calendario-header">
                <h3 id="mes-ciclo">Ciclo Atual</h3>
                <small>22 ao 21</small>
            </div>
            <div class="grid-calendario" id="grid-dias">
                </div>
        </div>

        <div class="painel-controle">
            <div class="box">
                <div id="relogio">00:00:00</div>
                <div id="data" style="text-align: center; font-size: 0.8rem; color: #94a3b8;"></div>
                <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
                <div class="btns">
                    <button class="btn-iniciar" onclick="baterPonto('INICIAR')">INICIAR TRABALHO</button>
                    <button class="btn-saida" onclick="baterPonto('SAÍDA/RETORNO')">SAÍDA / RETORNO</button>
                    <button class="btn-parar" onclick="baterPonto('PARAR')">PARAR TRABALHO</button>
                </div>
            </div>

            <div class="box">
                <strong>Detalhes do Dia: <span id="dia-selecionado">Hoje</span></strong>
                <div id="detalhes-lista" class="historico-dia">
                    Clique em um dia no calendário para ver os registros.
                </div>
            </div>
        </div>
    </div>

    <script>
        let registros = JSON.parse(localStorage.getItem('borel_v3')) || [];

        // Relógio
        setInterval(() => {
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR', {dateStyle: 'full'});
        }, 1000);

        // Gerar Calendário do Ciclo (22 ao 21)
        function gerarCalendario() {
            const grid = document.getElementById('grid-dias');
            grid.innerHTML = '';
            
            // Nomes dos dias
            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'].forEach(d => {
                grid.innerHTML += `<div class="dia-semana">${d}</div>`;
            });

            const hoje = new Date();
            let inicioCiclo, fimCiclo;

            // Lógica para definir se o ciclo começou no dia 22 do mês passado ou deste mês
            if (hoje.getDate() >= 22) {
                inicioCiclo = new Date(hoje.getFullYear(), hoje.getMonth(), 22);
                fimCiclo = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 21);
            } else {
                inicioCiclo = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 22);
                fimCiclo = new Date(hoje.getFullYear(), hoje.getMonth(), 21);
            }

            // Preencher espaços vazios até o primeiro dia da semana do ciclo
            for (let i = 0; i < inicioCiclo.getDay(); i++) {
                grid.innerHTML += `<div class="dia outro-mes"></div>`;
            }

            // Loop entre data de início e fim
            let dataCursor = new Date(inicioCiclo);
            while (dataCursor <= fimCiclo) {
                const diaNum = dataCursor.getDate();
                const dataId = dataCursor.toLocaleDateString('pt-BR');
                const temPonto = registros.some(r => r.data === dataId);
                const isHoje = dataId === hoje.toLocaleDateString('pt-BR');

                const divDia = document.createElement('div');
                divDia.className = `dia ${temPonto ? 'com-ponto' : ''} ${isHoje ? 'hoje' : ''}`;
                divDia.innerText = diaNum;
                divDia.onclick = () => verDetalhesDia(dataId);
                
                grid.appendChild(divDia);
                dataCursor.setDate(dataCursor.getDate() + 1);
            }
        }

        function baterPonto(tipo) {
            if (confirm(`Confirmar ${tipo}?`)) {
                const agora = new Date();
                registros.push({
                    tipo: tipo,
                    hora: agora.toLocaleTimeString('pt-BR'),
                    data: agora.toLocaleDateString('pt-BR'),
                    timestamp: agora.getTime()
                });
                localStorage.setItem('borel_v3', JSON.stringify(registros));
                gerarCalendario();
                atualizarBeneficios();
            }
        }

        function verDetalhesDia(dataId) {
            document.getElementById('dia-selecionado').innerText = dataId;
            const pontosDia = registros.filter(r => r.data === dataId);
            const container = document.getElementById('detalhes-lista');
            
            if (pontosDia.length === 0) {
                container.innerHTML = "Sem registros para este dia.";
            } else {
                container.innerHTML = pontosDia.map(p => `<div>• <b>${p.tipo}</b> às ${p.hora}</div>`).join('');
                // Aqui você pode adicionar um campo para a Carga de Produção futuramente
                container.innerHTML += `<br><small style="color:var(--orange)">Dica: Adicionar carga de produção para este dia?</small>`;
            }
        }

        function atualizarBeneficios() {
            // Aqui entra a lógica de cálculo de horas que vimos antes
            // Vou simplificar para mostrar o visual mudando
            let faltas = 0; // Exemplo: somar logicamente
            document.getElementById('val-faltas').innerText = "0h 0m";
        }

        gerarCalendario();
    </script>
</body>
</html>
