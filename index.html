<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BorelTec | Ponto PWA</title>
    <style>
        /* =========================================
           Estilo Dark/Neon (Hacker Aesthetic)
           ========================================= */
        :root {
            --bg-color: #050505;
            --panel-bg: #111111;
            --neon-blue: #00f3ff;
            --neon-blue-dim: rgba(0, 243, 255, 0.2);
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --alert-red: #ff0055;
            --font-family: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Tipografia e Efeitos Neon */
        h1, h2, h3 {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 10px var(--neon-blue-dim);
        }

        /* Controles e Inputs */
        select, input[type="time"], button {
            background-color: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus, input[type="time"]:focus {
            box-shadow: 0 0 8px var(--neon-blue);
        }

        button {
            background-color: var(--neon-blue-dim);
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Dashboards e Dados */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: #0a0a0a;
            border: 1px dashed var(--text-muted);
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }

        .stat-value {
            display: block;
            font-size: 1.2rem;
            color: var(--neon-blue);
            margin-top: 5px;
            font-weight: bold;
        }

        /* Barra de Progresso */
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: #222;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--neon-blue);
            width: 0%;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.5s ease;
        }

        /* Lista de Histórico */
        .history-list {
            list-style: none;
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        .btn-delete {
            width: auto;
            margin: 0;
            padding: 5px 10px;
            border-color: var(--alert-red);
            color: var(--alert-red);
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: var(--alert-red);
            color: white;
            box-shadow: 0 0 10px var(--alert-red);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>BorelTec.SYS</h1>

    <div class="panel">
        <h2>Controle Mensal</h2>
        <input type="month" id="monthSelector" onchange="app.updateMonthlyData()">
        
        <div class="dashboard-grid">
            <div class="stat-box">
                <small>Meta do Mês (Regressiva)</small>
                <span class="stat-value" id="monthlyGoalDisplay">00h 00m</span>
            </div>
            <div class="stat-box">
                <small>Dias Úteis</small>
                <span class="stat-value" id="workingDaysDisplay">0</span>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Registro Diário</h2>
        <input type="date" id="dateSelector" onchange="app.loadDailyData()">
        <div style="display: flex; gap: 10px;">
            <input type="time" id="timeInput">
            <button onclick="app.addPunch()">Registrar</button>
        </div>

        <ul class="history-list" id="punchList"></ul>
    </div>

    <div class="panel">
        <h2>Status de Hoje</h2>
        <div class="dashboard-grid">
            <div class="stat-box">
                <small>Saída Prevista (ETA)</small>
                <span class="stat-value" id="etaDisplay">--:--</span>
            </div>
            <div class="stat-box">
                <small>Horas Normais</small>
                <span class="stat-value" id="normalWorkedDisplay">00h 00m</span>
            </div>
            <div class="stat-box">
                <small>Horas Extras</small>
                <span class="stat-value" id="extraWorkedDisplay">00h 00m</span>
            </div>
            <div class="stat-box">
                <small>Desconto Almoço</small>
                <span class="stat-value" id="lunchDeductionDisplay">0 min</span>
            </div>
        </div>
        
        <small style="display:block; margin-top:15px;">Progresso Diário (Meta: 9h 03m)</small>
        <div class="progress-container">
            <div class="progress-bar" id="dailyProgressBar"></div>
        </div>
    </div>
</div>

<script>
    /**
     * =========================================
     * BORELTEC CORE LOGIC (As Engrenagens)
     * =========================================
     */
    const app = {
        data: JSON.parse(localStorage.getItem('boreltec_data')) || {},
        
        // Constantes das Regras de Negócio Estritas
        rules: {
            normalStart: 7 * 60 + 15,  // 07:15 em minutos (435)
            normalEnd: 17 * 60 + 28,   // 17:28 em minutos (1048)
            dailyGoalMins: 9 * 60 + 3, // 9h 03m (543)
            lunchDeduction: 70,        // 70 minutos
            etaShiftDuration: 10 * 60 + 13 // 10h 13m (Jornada + Almoço)
        },

        init() {
            // Seta a data de hoje por padrão
            const today = new Date();
            const yearMonth = today.toISOString().slice(0, 7);
            const fullDate = today.toISOString().slice(0, 10);
            
            document.getElementById('monthSelector').value = yearMonth;
            document.getElementById('dateSelector').value = fullDate;
            
            this.updateMonthlyData();
            this.loadDailyData();
        },

        save() {
            localStorage.setItem('boreltec_data', JSON.stringify(this.data));
            this.updateMonthlyData();
            this.loadDailyData();
        },

        // --- ENGRENAGEM A: Calendário e Meta Dinâmica ---
        getWorkingDaysInMonth(year, month) {
            let daysInMonth = new Date(year, month, 0).getDate();
            let workingDays = 0;
            
            for (let i = 1; i <= daysInMonth; i++) {
                let currentDay = new Date(year, month - 1, i).getDay();
                // 0 = Domingo, 6 = Sábado
                if (currentDay !== 0 && currentDay !== 6) {
                    workingDays++;
                }
            }
            return workingDays;
        },

        updateMonthlyData() {
            const monthVal = document.getElementById('monthSelector').value;
            if(!monthVal) return;
            
            const [year, month] = monthVal.split('-');
            const workingDays = this.getWorkingDaysInMonth(year, month);
            
            // Meta Total do Mês em minutos
            const totalMonthlyGoalMins = workingDays * this.rules.dailyGoalMins;
            
            // Aqui entrará no futuro a lógica de subtrair o que já foi trabalhado
            // Por enquanto, exibe a meta total calculada
            
            document.getElementById('workingDaysDisplay').innerText = workingDays;
            document.getElementById('monthlyGoalDisplay').innerText = this.formatTime(totalMonthlyGoalMins);
        },

        // --- MANIPULAÇÃO DE DADOS DIÁRIOS ---
        addPunch() {
            const date = document.getElementById('dateSelector').value;
            const time = document.getElementById('timeInput').value;
            
            if (!date || !time) return;

            if (!this.data[date]) this.data[date] = [];
            
            // Evita duplicadas e ordena
            if (!this.data[date].includes(time)) {
                this.data[date].push(time);
                this.data[date].sort();
                this.save();
            }
            document.getElementById('timeInput').value = '';
        },

        deletePunch(time) {
            const date = document.getElementById('dateSelector').value;
            this.data[date] = this.data[date].filter(t => t !== time);
            this.save();
        },

        loadDailyData() {
            const date = document.getElementById('dateSelector').value;
            const punches = this.data[date] || [];
            
            // Renderiza Lista
            const listEl = document.getElementById('punchList');
            listEl.innerHTML = '';
            punches.forEach(time => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span>&gt; ${time}</span>
                    <button class="btn-delete" onclick="app.deletePunch('${time}')">DEL</button>
                `;
                listEl.appendChild(li);
            });

            this.calculateDailyEngines(date, punches);
        },

        // --- ENGRENAGENS B e C: Filtro de Qualidade e ETA ---
        calculateDailyEngines(dateStr, punches) {
            let normalWorked = 0;
            let extraWorked = 0;
            let eta = "--:--";
            let lunchApplied = false;

            // Verifica se é fim de semana
            const dateObj = new Date(dateStr + "T00:00:00");
            const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;

            // Engrenagem C: ETA (Baseado no primeiro punch)
            if (punches.length > 0) {
                const firstPunchMins = this.timeToMins(punches[0]);
                eta = this.minsToTime(firstPunchMins + this.rules.etaShiftDuration);
            }

            // Engrenagem B: Cálculo de Intervalos em pares (Entrada/Saída)
            for (let i = 0; i < punches.length; i += 2) {
                if (punches[i+1]) {
                    const startMins = this.timeToMins(punches[i]);
                    const endMins = this.timeToMins(punches[i+1]);

                    if (isWeekend) {
                        // Finais de semana ignoram a meta, tudo é extra
                        extraWorked += (endMins - startMins);
                    } else {
                        // Janela Normal: Intersecção com 07:15 - 17:28
                        const overlapStart = Math.max(startMins, this.rules.normalStart);
                        const overlapEnd = Math.min(endMins, this.rules.normalEnd);

                        if (overlapStart < overlapEnd) {
                            normalWorked += (overlapEnd - overlapStart);
                        }
                        
                        // Extra é o tempo total do intervalo menos o tempo normal
                        const totalInterval = endMins - startMins;
                        extraWorked += totalInterval - Math.max(0, overlapEnd - overlapStart);
                    }
                }
            }

            // Regra do Almoço: Descontar 70min se o turno normal exceder 6h (360min)
            if (normalWorked > 360) {
                normalWorked -= this.rules.lunchDeduction;
                lunchApplied = true;
            }

            // Atualiza Interface
            document.getElementById('etaDisplay').innerText = eta;
            document.getElementById('normalWorkedDisplay').innerText = this.formatTime(normalWorked);
            document.getElementById('extraWorkedDisplay').innerText = this.formatTime(extraWorked);
            document.getElementById('lunchDeductionDisplay').innerText = lunchApplied ? "-70 min" : "0 min";
            document.getElementById('lunchDeductionDisplay').style.color = lunchApplied ? "var(--alert-red)" : "var(--text-main)";

            // Atualiza Barra de Progresso
            const progress = Math.min((normalWorked / this.rules.dailyGoalMins) * 100, 100);
            document.getElementById('dailyProgressBar').style.width = progress + '%';
        },

        // Utilitários de Tempo
        timeToMins(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        },

        minsToTime(mins) {
            const h = Math.floor(mins / 60) % 24; // % 24 para virar o dia se necessário
            const m = mins % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        },

        formatTime(totalMins) {
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            return `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m`;
        }
    };

    // Inicializa o sistema ao carregar a página
    window.onload = () => app.init();

</script>
</body>
</html>
