<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BOREL TEC - Gestão Pro</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --green: #10b981; --red: #ef4444; --orange: #f59e0b; --text: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
        
        /* Dashboard Header */
        .dashboard-nav { 
            position: sticky; top: 0; background: var(--card); padding: 20px; 
            display: flex; gap: 20px; justify-content: center; z-index: 100;
            border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .stat-card { background: rgba(255,255,255,0.03); padding: 12px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); min-width: 150px; text-align: center; }
        .stat-card small { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card strong { font-size: 1.3rem; display: block; margin-top: 5px; }

        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }

        /* Monitor de Jornada (Centro) */
        .monitor-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .clock-large { font-size: 4.5rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -2px; }
        
        .progress-container { background: #334155; height: 12px; border-radius: 10px; margin: 25px 0; overflow: hidden; position: relative; }
        #progress-bar { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 15px var(--accent); }

        .eta-box { display: flex; justify-content: space-around; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .eta-box div { font-size: 0.9rem; color: #94a3b8; }
        .eta-box strong { color: var(--text); font-size: 1.1rem; display: block; }

        /* Botão de Ação Único (Estado Dinâmico) */
        .main-action-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; color: white; margin-bottom: 10px;
        }
        .btn-start { background: var(--accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .btn-pause { background: var(--orange); }
        .btn-stop { background: var(--red); }

        /* Calendário e Histórico */
        .side-box { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .history-list { margin-top: 15px; font-size: 0.85rem; }
        .session-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        
        .warning-text { color: var(--orange); font-size: 0.75rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="dashboard-nav">
        <div class="stat-card">
            <small>Alimentação</small>
            <strong id="val-alim">R$ 270,00</strong>
            <div id="alim-warning" class="warning-text" style="display:none">RISCO DE PERDA</div>
        </div>
        <div class="stat-card">
            <small>Saldo do Ciclo</small>
            <strong id="val-saldo">0h 00m</strong>
        </div>
        <div class="stat-card">
            <small>Faltas Acumuladas</small>
            <strong id="val-faltas" style="color:var(--red)">0h 00m</strong>
        </div>
    </nav>

    <div class="main-container">
        <div class="left-panel">
            <div class="monitor-box">
                <div id="relogio" class="clock-large">00:00:00</div>
                <div id="data-atual" style="color:#94a3b8">Carregando...</div>

                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>

                <div class="eta-box">
                    <div>Entrada <strong>--:--</strong></div>
                    <div>Saída Prevista <strong id="eta-saida" style="color:var(--green)">--:--</strong></div>
                </div>

                <button id="action-btn" class="main-action-btn btn-start" onclick="handleMainAction()">Iniciar Jornada</button>
                <button id="pause-btn" class="main-action-btn btn-pause" style="display:none" onclick="handlePause()">Intervalo / Almoço</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="side-box">
                <strong>Resumo de Hoje</strong>
                <div id="hoje-history" class="history-list">Aguardando início...</div>
            </div>
            
            <div class="side-box">
                <strong>Calendário do Ciclo (22 a 21)</strong>
                <div id="ciclo-summary" style="font-size: 0.8rem; margin-top: 10px; color: #94a3b8;">
                    O sistema soma automaticamente seus registros do período atual.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configurações Técnicas
        const JORNADA_MINS = 543; // 9h 03min
        const ALMOCO_MINS = 70; // 1h 10min
        
        let db = JSON.parse(localStorage.getItem('borel_pro_v1')) || [];
        let estadoAtivo = localStorage.getItem('borel_status') || 'PARADO'; // PARADO, TRABALHANDO, PAUSA

        function init() {
            atualizarRelogio();
            setInterval(atualizarRelogio, 1000);
            renderizarInterface();
            calcularCiclo();
        }

        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR', {dateStyle: 'full'});
            
            if (estadoAtivo === 'TRABALHANDO') {
                atualizarProgresso();
            }
        }

        function handleMainAction() {
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');

            if (estadoAtivo === 'PARADO' || estadoAtivo === 'PAUSA') {
                estadoAtivo = 'TRABALHANDO';
                registrar('INÍCIO', agora);
            } else {
                if(confirm("Deseja FINALIZAR o dia?")) {
                    estadoAtivo = 'PARADO';
                    registrar('FIM', agora);
                }
            }
            salvarESincronizar();
        }

        function handlePause() {
            const agora = new Date();
            estadoAtivo = 'PAUSA';
            registrar('PAUSA/RETORNO', agora);
            salvarESincronizar();
        }

        function registrar(tipo, dataObj) {
            db.push({
                tipo,
                ts: dataObj.getTime(),
                data: dataObj.toLocaleDateString('pt-BR'),
                hora: dataObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
            });
        }

        function salvarESincronizar() {
            localStorage.setItem('borel_pro_v1', JSON.stringify(db));
            localStorage.setItem('borel_status', estadoAtivo);
            renderizarInterface();
            calcularCiclo();
        }

        function renderizarInterface() {
            const btn = document.getElementById('action-btn');
            const pBtn = document.getElementById('pause-btn');
            const pontosHoje = db.filter(r => r.data === new Date().toLocaleDateString('pt-BR'));

            // Reset visual
            btn.className = "main-action-btn";
            pBtn.style.display = "none";

            if (estadoAtivo === 'PARADO') {
                btn.innerText = "Iniciar Jornada";
                btn.classList.add('btn-start');
            } else if (estadoAtivo === 'TRABALHANDO') {
                btn.innerText = "Finalizar Trabalho";
                btn.classList.add('btn-stop');
                pBtn.style.display = "block";
            } else if (estadoAtivo === 'PAUSA') {
                btn.innerText = "Retornar ao Trabalho";
                btn.classList.add('btn-start');
            }

            // Histórico de Hoje
            document.getElementById('hoje-history').innerHTML = pontosHoje.map(p => `
                <div class="session-item"><span>${p.tipo}</span> <strong>${p.hora}</strong></div>
            `).join('');

            // Saída Prevista (ETA)
            if (pontosHoje.length > 0) {
                const primEntrada = new Date(pontosHoje[0].ts);
                const saidaPrevista = new Date(primEntrada.getTime() + (JORNADA_MINS * 60000) + (ALMOCO_MINS * 60000));
                document.getElementById('eta-saida').innerText = saidaPrevista.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                document.querySelector('.eta-box div strong').innerText = pontosHoje[0].hora;
            }
        }

        function atualizarProgresso() {
            const pontosHoje = db.filter(r => r.data === new Date().toLocaleDateString('pt-BR'));
            if (pontosHoje.length === 0) return;

            const agora = new Date().getTime();
            const inicio = pontosHoje[0].ts;
            const tempoDecorridoMins = (agora - inicio) / 60000;
            const metaTotalComAlmoco = JORNADA_MINS + ALMOCO_MINS;
            
            let percent = (tempoDecorridoMins / metaTotalComAlmoco) * 100;
            if (percent > 100) percent = 100;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function calcularCiclo() {
            let totalFaltas = 0;
            let totalTrabalhado = 0;

            const agrupado = {};
            db.forEach(r => {
                if (!agrupado[r.data]) agrupado[r.data] = [];
                agrupado[r.data].push(r);
            });

            Object.values(agrupado).forEach(dia => {
                dia.sort((a,b) => a.ts - b.ts);
                let minsDia = 0;
                for (let i = 0; i < dia.length; i += 2) {
                    if (dia[i+1]) minsDia += (dia[i+1].ts - dia[i].ts) / 60000;
                }
                if (minsDia > 360) minsDia -= ALMOCO_MINS;

                if (minsDia > 0) {
                    totalTrabalhado += minsDia;
                    if (minsDia < JORNADA_MINS) totalFaltas += (JORNADA_MINS - minsDia);
                }
            });

            document.getElementById('val-saldo').innerText = formatar(totalTrabalhado);
            document.getElementById('val-faltas').innerText = formatar(totalFaltas);

            // Regra do Alimentação (270)
            const horasFalta = totalFaltas / 60;
            const cardAlim = document.getElementById('val-alim');
            const warning = document.getElementById('alim-warning');

            if (horasFalta >= 2) {
                cardAlim.innerText = "R$ 0,00";
                cardAlim.style.color = "var(--red)";
                warning.style.display = "none";
            } else if (horasFalta >= 1) {
                cardAlim.innerText = "R$ 270,00";
                cardAlim.style.color = "var(--orange)";
                warning.style.display = "block";
            } else {
                cardAlim.innerText = "R$ 270,00";
                cardAlim.style.color = "var(--green)";
                warning.style.display = "none";
            }
        }

        function formatar(min) {
            const h = Math.floor(min / 60);
            const m = Math.round(min % 60);
            return `${h}h ${String(m).padStart(2, '0')}m`;
        }

        init();
    </script>
</body>
</html>
