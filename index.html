<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOREL TEC - Gestão de Ponto Profissional</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --green: #10b981; --red: #ef4444; --orange: #f59e0b; --text: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* HEADER STATUS */
        .dashboard-nav { 
            position: sticky; top: 0; background: var(--card); padding: 15px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; 
            z-index: 100; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-card small { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; display: block; }
        .stat-card strong { font-size: 1.2rem; display: block; margin-top: 5px; }

        .main-grid { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 400px; gap: 25px; }

        /* CALENDÁRIO */
        .box { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-btn { background: #334155; border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .dia-nome { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        .dia-num { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.03); border-radius: 8px; cursor: pointer; font-size: 0.9rem;
            border: 1px solid transparent; transition: 0.2s;
        }
        .dia-num:hover { background: var(--accent); }
        .dia-num.hoje { background: var(--accent); font-weight: bold; }
        .dia-num.tem-ponto { border-color: var(--green); color: var(--green); }
        .dia-num.selecionado { border-color: white; transform: scale(1.05); }
        .dia-num.vazio { opacity: 0; pointer-events: none; }

        /* PAINEL DE CONTROLE */
        #relogio { font-size: 3.5rem; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        
        .progresso-container { background: #334155; height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progresso-barra { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--accent); }

        .previsao-box { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 0.85rem; }
        .previsao-box strong { display: block; font-size: 1.1rem; color: var(--green); }

        .btn-group { display: grid; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; transition: 0.2s; }
        .btn-iniciar { background: var(--accent); }
        .btn-pausa { background: var(--orange); }
        .btn-parar { background: var(--red); }

        /* HISTÓRICO */
        .historico-dia { border-top: 1px solid #334155; margin-top: 15px; padding-top: 15px; }
        .ponto-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; }
        .btn-excluir { background: none; border: 1px solid var(--red); color: var(--red); width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="dashboard-nav">
        <div class="stat-card"><small id="label-meta">Meta do Mês</small><strong id="res-meta-mes">0h 00m</strong></div>
        <div class="stat-card"><small>Horas Normais</small><strong id="res-total-normal">0h 00m</strong></div>
        <div class="stat-card"><small>Horas Extras</small><strong id="res-total-extra" style="color:var(--accent)">0h 00m</strong></div>
        <div class="stat-card"><small>Alimentação</small><strong id="res-alim">R$ 270,00</strong></div>
    </nav>

    <div class="main-grid">
        <div class="box">
            <div class="cal-header">
                <button class="cal-btn" onclick="mudarMes(-1)">◀</button>
                <h2 id="cal-titulo">Mês Ano</h2>
                <button class="cal-btn" onclick="mudarMes(1)">▶</button>
            </div>
            <div class="grid-dias" id="grid-dias"></div>
        </div>

        <div class="sidebar">
            <div class="box">
                <div id="relogio">00:00:00</div>
                <div class="progresso-container"><div id="progresso-barra"></div></div>

                <div class="previsao-box">
                    <div>Entrada Hoje <strong id="txt-entrada">--:--</strong></div>
                    <div>Saída Prevista <strong id="txt-saida">--:--</strong></div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-iniciar" onclick="baterPonto('INICIAR')">Iniciar Trabalho</button>
                    <button class="btn btn-pausa" onclick="baterPonto('PAUSA/RETORNO')">Intervalo / Almoço</button>
                    <button class="btn btn-parar" onclick="baterPonto('FINALIZAR')">Finalizar Dia</button>
                </div>
            </div>

            <div class="box" style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>Dia: <span id="data-view">--/--</span></strong>
                    <button id="btn-del" class="btn-excluir" style="display:none; width: auto; margin:0" onclick="excluirDia()">Apagar</button>
                </div>
                <div id="lista-pontos" class="historico-dia"></div>
            </div>
        </div>
    </div>

    <script>
        const JORNADA_DIARIA = 543; // 9h 03m
        const ALMOCO = 70;         // 1h 10m
        const INICIO_NORMAL = "07:15";
        const FIM_NORMAL = "17:28";

        let registros = JSON.parse(localStorage.getItem('borel_v8_final')) || [];
        let dataVisualizacao = new Date();
        let diaSelecionadoStr = new Date().toLocaleDateString('pt-BR');

        function init() {
            renderizarCalendario();
            setInterval(atualizarTempoReal, 1000);
            selecionarDia(diaSelecionadoStr);
            calcularTudo();
        }

        function atualizarTempoReal() {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
            const hoje = new Date().toLocaleDateString('pt-BR');
            if (diaSelecionadoStr === hoje) {
                const pontos = registros.filter(r => r.data === hoje).sort((a,b) => a.ts - b.ts);
                if (pontos.length > 0) {
                    const totalNecessario = (JORNADA_DIARIA + ALMOCO) * 60000;
                    let perc = ((new Date().getTime() - pontos[0].ts) / totalNecessario) * 100;
                    document.getElementById('progresso-barra').style.width = Math.min(perc, 100) + "%";
                }
            }
        }

        function mudarMes(dir) {
            dataVisualizacao.setMonth(dataVisualizacao.getMonth() + dir);
            renderizarCalendario();
            calcularTudo();
        }

        function renderizarCalendario() {
            const grid = document.getElementById('grid-dias');
            grid.innerHTML = '';
            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'].forEach(d => grid.innerHTML += `<div class="dia-nome">${d}</div>`);

            const ano = dataVisualizacao.getFullYear();
            const mes = dataVisualizacao.getMonth();
            document.getElementById('cal-titulo').innerText = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(dataVisualizacao);

            const primeiroDia = new Date(ano, mes, 1).getDay();
            const ultimoDia = new Date(ano, mes + 1, 0).getDate();

            for (let i = 0; i < primeiroDia; i++) grid.innerHTML += `<div class="dia-num vazio"></div>`;

            for (let i = 1; i <= ultimoDia; i++) {
                const dataId = `${String(i).padStart(2, '0')}/${String(mes + 1).padStart(2, '0')}/${ano}`;
                const temPonto = registros.some(r => r.data === dataId);
                const isHoje = new Date().toLocaleDateString('pt-BR') === dataId;
                const isSel = diaSelecionadoStr === dataId;

                const div = document.createElement('div');
                div.className = `dia-num ${temPonto ? 'tem-ponto' : ''} ${isHoje ? 'hoje' : ''} ${isSel ? 'selecionado' : ''}`;
                div.innerText = i;
                div.onclick = () => selecionarDia(dataId);
                grid.appendChild(div);
            }
        }

        function baterPonto(tipo) {
            if (!confirm(`Registrar ${tipo}?`)) return;
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            registros.push({ tipo, data: dataStr, hora: agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}), ts: agora.getTime() });
            localStorage.setItem('borel_v8_final', JSON.stringify(registros));
            renderizarCalendario();
            selecionarDia(dataStr);
            calcularTudo();
        }

        function selecionarDia(dataId) {
            diaSelecionadoStr = dataId;
            document.getElementById('data-view').innerText = dataId;
            const pontos = registros.filter(r => r.data === dataId).sort((a,b) => a.ts - b.ts);
            const container = document.getElementById('lista-pontos');
            const btnDel = document.getElementById('btn-del');

            btnDel.style.display = pontos.length > 0 ? 'block' : 'none';
            container.innerHTML = pontos.length > 0 ? pontos.map(p => `<div class="ponto-item"><span>${p.tipo}</span><strong>${p.hora}</strong></div>`).join('') : "Sem registros.";

            if (pontos.length > 0) {
                document.getElementById('txt-entrada').innerText = pontos[0].hora;
                const saidaTs = new Date(pontos[0].ts + (JORNADA_DIARIA + ALMOCO) * 60000);
                document.getElementById('txt-saida').innerText = saidaTs.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            } else {
                document.getElementById('txt-entrada').innerText = "--:--";
                document.getElementById('txt-saida').innerText = "--:--";
                document.getElementById('progresso-barra').style.width = "0%";
            }
            renderizarCalendario();
        }

        function excluirDia() {
            if (confirm(`Excluir dia ${diaSelecionadoStr}?`)) {
                registros = registros.filter(r => r.data !== diaSelecionadoStr);
                localStorage.setItem('borel_v8_final', JSON.stringify(registros));
                selecionarDia(diaSelecionadoStr);
                calcularTudo();
            }
        }

        function calcularTudo() {
            const ano = dataVisualizacao.getFullYear();
            const mes = dataVisualizacao.getMonth();
            let diasUteisMês = 0;
            for (let d = 1; d <= new Date(ano, mes + 1, 0).getDate(); d++) {
                const ds = new Date(ano, mes, d).getDay();
                if (ds > 0 && ds < 6) diasUteisMês++;
            }
            const metaMensalMinutos = diasUteisMês * JORNADA_DIARIA;
            document.getElementById('label-meta').innerText = `Meta de ${new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(dataVisualizacao)}`;

            let totalNormal = 0;
            let totalExtra = 0;
            const diasAgrupados = {};

            registros.filter(r => {
                const [d, m, a] = r.data.split('/');
                return parseInt(m) === mes + 1 && parseInt(a) === ano;
            }).forEach(r => {
                if (!diasAgrupados[r.data]) diasAgrupados[r.data] = [];
                diasAgrupados[r.data].push(r);
            });

            Object.keys(diasAgrupados).forEach(dataStr => {
                const pts = diasAgrupados[dataStr].sort((a,b) => a.ts - b.ts);
                const [d, m, a] = dataStr.split('/');
                const diaSemana = new Date(a, m-1, d).getDay();

                if (diaSemana === 0 || diaSemana === 6) {
                    for (let i = 0; i < pts.length; i += 2) if(pts[i+1]) totalExtra += (pts[i+1].ts - pts[i].ts) / 60000;
                } else {
                    let diaNormal = 0;
                    for (let i = 0; i < pts.length; i += 2) {
                        if (!pts[i+1]) continue;
                        const ent = new Date(pts[i].ts);
                        const sai = new Date(pts[i+1].ts);
                        const lMin = new Date(ent); lMin.setHours(7, 15, 0);
                        const lMax = new Date(sai); lMax.setHours(17, 28, 0);

                        if (ent < lMin) totalExtra += (Math.min(sai.getTime(), lMin.getTime()) - ent.getTime()) / 60000;
                        if (sai > lMax) totalExtra += (sai.getTime() - Math.max(ent.getTime(), lMax.getTime())) / 60000;

                        const iNorm = Math.max(ent.getTime(), lMin.getTime());
                        const fNorm = Math.min(sai.getTime(), lMax.getTime());
                        if (fNorm > iNorm) diaNormal += (fNorm - iNorm) / 60000;
                    }
                    if (diaNormal > 360) diaNormal -= ALMOCO;
                    totalNormal += Math.max(0, diaNormal);
                }
            });

            const saldoRegressivo = metaMensalMinutos - totalNormal;
            document.getElementById('res-meta-mes').innerText = formatar(Math.max(0, saldoRegressivo));
            document.getElementById('res-total-normal').innerText = formatar(totalNormal);
            document.getElementById('res-total-extra').innerText = formatar(totalExtra);
            
            // Lógica Vale Alimentação baseada em faltas acumuladas (ex: se faltar > 2h no mês)
            const horasFaltandoNoMes = (metaMensalMinutos - totalNormal) / 60;
            // Nota: Esta regra pode variar, aqui usei a lógica de se houver saldo devedor grande
            document.getElementById('res-alim').innerText = "R$ 270,00";
        }

        function formatar(min) {
            const h = Math.floor(min / 60);
            const m = Math.round(min % 60);
            return `${h}h ${String(m).padStart(2, '0')}m`;
        }

        init();
    </script>
</body>
</html>
